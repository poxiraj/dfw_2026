<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ankur, We Miss You</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400;1,600&family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      background: #05030f;
      overflow: hidden;
    }

    /* ── Heavenly canvas (behind everything) ─────────────────────────── */
    #heaven-canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
      display: block;
    }

    /* ── Photo layer ─────────────────────────────────────────────────── */
    .bg {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
      pointer-events: none;
    }

    .bg-photo {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
      /* soft halo/glow around the subject */
      filter: drop-shadow(0 0 38px rgba(255, 230, 160, 0.45))
              drop-shadow(0 0 90px rgba(200, 170, 255, 0.18));
    }

    /* Bottom vignette — darkens lower portion so caption reads clearly */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        transparent 55%,
        rgba(5, 3, 15, 0.55) 72%,
        rgba(3, 2, 10, 0.92) 88%,
        rgba(2, 1, 6,  0.99) 100%
      );
      pointer-events: none;
    }

    /* ── Caption ─────────────────────────────────────────────────────── */
    .caption-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: max(2.5rem, env(safe-area-inset-bottom));
      gap: 0.45rem;
    }

    .caption-ornament {
      font-size: 1rem;
      letter-spacing: 0.4em;
      color: rgba(220, 190, 130, 0.6);
      animation: caption-breathe 4s ease-in-out infinite;
    }

    .caption {
      font-family: 'Cinzel', serif;
      font-size: clamp(1.6rem, 5.5vw, 3rem);
      font-weight: 600;
      color: #f5ead8;
      letter-spacing: 0.06em;
      text-align: center;
      line-height: 1.3;
      text-shadow:
        0 0 18px rgba(200, 155, 80, 0.65),
        0 0 48px rgba(200, 155, 80, 0.25),
        0 2px 8px rgba(0, 0, 0, 0.85);
      animation: caption-breathe 4s ease-in-out infinite;
    }

    .caption em {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15em;
      color: #e8d5aa;
    }

    @keyframes caption-breathe {
      0%, 100% { opacity: 0.88; }
      50%       { opacity: 1;    }
    }

    /* ── Incense scene container ─────────────────────────────────────── */
    .incense-scene {
      position: fixed;
      inset: 0;
      z-index: 5;
      pointer-events: none;
    }

    /* ── Single incense stick ────────────────────────────────────────── */
    .stick-wrap {
      position: absolute;
      bottom: 0;
      transform-origin: bottom center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Smoke canvas sits above the stick tip */
    .smoke-canvas {
      position: absolute;
      bottom: 100%;  /* anchors to top of stick */
      left: 50%;
      transform: translateX(-50%);
      pointer-events: none;
    }

    /* Stick body */
    .stick {
      position: relative;
      width: 3px;
      border-radius: 1.5px;
    }

    /* Wooden part (lower ~80%) */
    .stick-wood {
      width: 100%;
      border-radius: 1.5px 1.5px 0 0;
      background: linear-gradient(to bottom, #7a4a1a 0%, #5c3510 60%, #3d2108 100%);
    }

    /* Incense coating (upper ~20%) */
    .stick-coating {
      width: 100%;
      border-radius: 1.5px 1.5px 0 0;
      background: linear-gradient(to bottom, #a86030 0%, #7a4520 100%);
      box-shadow: 0 0 3px rgba(200, 100, 40, 0.4);
    }

    /* Glowing tip */
    .stick-tip {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff8e0 0%, #ff8c00 40%, #cc4400 80%, transparent 100%);
      box-shadow:
        0 0 4px 2px rgba(255, 140, 0, 0.7),
        0 0 12px 5px rgba(255, 80, 0, 0.35);
      animation: tip-flicker 1.8s ease-in-out infinite;
      margin-bottom: -1px;
      align-self: center;
    }

    @keyframes tip-flicker {
      0%, 100% { opacity: 1;    box-shadow: 0 0 4px 2px rgba(255,140,0,0.7), 0 0 12px 5px rgba(255,80,0,0.35); }
      33%       { opacity: 0.82; box-shadow: 0 0 3px 1px rgba(255,140,0,0.5), 0 0 9px 3px rgba(255,80,0,0.25); }
      66%       { opacity: 0.95; box-shadow: 0 0 5px 3px rgba(255,160,0,0.8), 0 0 15px 6px rgba(255,80,0,0.4); }
    }

    /* Holder / base */
    .stick-holder {
      width: 18px;
      height: 6px;
      background: linear-gradient(to bottom, #6b3a10, #3d2005);
      border-radius: 3px 3px 0 0;
      box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    }

    /* ── Floating ash particles ───────────────────────────────────────── */
    .ash {
      position: absolute;
      border-radius: 50%;
      background: rgba(220, 200, 175, 0.55);
      pointer-events: none;
      animation: ash-drift linear forwards;
    }

    @keyframes ash-drift {
      0%   { transform: translate(0, 0) scale(1);       opacity: 0.7; }
      100% { transform: translate(var(--ax), var(--ay)) scale(0.3); opacity: 0; }
    }

    /* ── Floating petals (ambient mourning) ──────────────────────────── */
    .petal {
      position: fixed;
      width: 8px;
      height: 11px;
      border-radius: 50% 50% 50% 0;
      opacity: 0;
      pointer-events: none;
      z-index: 4;
      animation: petal-fall linear forwards;
    }
    @keyframes petal-fall {
      0%   { opacity: 0;   transform: translateX(0) translateY(-5vh) rotate(0deg); }
      5%   { opacity: 0.7; }
      95%  { opacity: 0.5; }
      100% { opacity: 0;   transform: translateX(var(--pdx)) translateY(105vh) rotate(var(--pr)); }
    }
  </style>
</head>
<body>

  <canvas id="heaven-canvas" aria-hidden="true"></canvas>

  <div class="bg" aria-hidden="true">
    <img class="bg-photo" src="images/ankur.png" alt="" />
  </div>

  <div class="incense-scene" id="incense-scene" aria-hidden="true"></div>

  <div class="caption-wrap">
    <div class="caption-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
    <h1 class="caption">Ankur, <em>We Miss You!</em></h1>
    <div class="caption-ornament">✦ &nbsp; ✦ &nbsp; ✦</div>
  </div>

  <script>
  /* ════════════════════════════════════════════════════════════════════
     HEAVENLY BACKGROUND — stars · aurora rays · divine orbs · clouds
  ═══════════════════════════════════════════════════════════════════ */
  (function heavenCanvas() {
    var c   = document.getElementById('heaven-canvas');
    var ctx = c.getContext('2d');
    var W, H, t = 0;

    function resize() {
      W = c.width  = window.innerWidth;
      H = c.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    /* ── Stars ──────────────────────────────────────────────────── */
    var stars = [];
    for (var i = 0; i < 260; i++) {
      stars.push({
        x: Math.random(),
        y: Math.random() * 0.75,
        r: 0.4 + Math.random() * 1.4,
        speed: 0.0002 + Math.random() * 0.0006,
        phase: Math.random() * Math.PI * 2,
        color: Math.random() < 0.15
          ? 'rgba(200,180,255,' : Math.random() < 0.3
          ? 'rgba(180,220,255,' : 'rgba(255,252,240,'
      });
    }

    /* ── Aurora light rays ──────────────────────────────────────── */
    var rays = [];
    var RAY_COLS = [
      [[160, 100, 255], [100, 180, 255]],  // violet→blue
      [[255, 180,  80], [255, 230, 130]],  // gold→pale gold
      [[80,  200, 200], [180, 255, 220]],  // teal→mint
      [[255, 120, 180], [255, 200, 220]],  // pink
      [[120, 160, 255], [200, 230, 255]],  // periwinkle
    ];
    for (var ri = 0; ri < 7; ri++) {
      var pair = RAY_COLS[ri % RAY_COLS.length];
      rays.push({
        x:     0.1 + Math.random() * 0.8,
        width: 0.04 + Math.random() * 0.12,
        speed: 0.00018 + Math.random() * 0.00025,
        phase: Math.random() * Math.PI * 2,
        colA: pair[0],
        colB: pair[1],
        alpha: 0.06 + Math.random() * 0.11,
      });
    }

    /* ── Divine orbs ────────────────────────────────────────────── */
    var orbs = [];
    var ORB_COLS = [
      [255, 230, 130],
      [200, 160, 255],
      [130, 210, 255],
      [255, 200, 160],
      [180, 255, 210],
    ];
    for (var oi = 0; oi < 14; oi++) {
      var oc = ORB_COLS[oi % ORB_COLS.length];
      orbs.push({
        x:     Math.random(),
        y:     0.05 + Math.random() * 0.6,
        r:     18 + Math.random() * 55,
        speedX: (Math.random() - 0.5) * 0.00008,
        speedY: (Math.random() - 0.5) * 0.00006,
        phase:  Math.random() * Math.PI * 2,
        color: oc,
        alpha: 0.055 + Math.random() * 0.10,
      });
    }

    /* ── Central divine halo (behind subject) ───────────────────── */
    function drawHalo() {
      var cx = W * 0.5, cy = H * 0.38;
      var pulse = 0.8 + 0.2 * Math.sin(t * 0.0008);

      /* outer soft ring */
      var g1 = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.52 * pulse);
      g1.addColorStop(0,   'rgba(255, 240, 180, 0.22)');
      g1.addColorStop(0.3, 'rgba(200, 160, 255, 0.14)');
      g1.addColorStop(0.6, 'rgba(130, 180, 255, 0.07)');
      g1.addColorStop(1,   'rgba(5,   3,  15,  0)');
      ctx.fillStyle = g1;
      ctx.fillRect(0, 0, W, H);

      /* core divine white glow */
      var g2 = ctx.createRadialGradient(cx, cy, 0, cx, cy, H * 0.22 * pulse);
      g2.addColorStop(0,   'rgba(255, 255, 240, 0.28)');
      g2.addColorStop(0.4, 'rgba(255, 220, 160, 0.12)');
      g2.addColorStop(1,   'rgba(255, 220, 160, 0)');
      ctx.fillStyle = g2;
      ctx.fillRect(0, 0, W, H);
    }

    /* ── Draw cloud wisps ───────────────────────────────────────── */
    var cloudSeeds = [];
    for (var ci = 0; ci < 8; ci++) {
      cloudSeeds.push({
        x: Math.random(), y: 0.02 + Math.random() * 0.45,
        w: 0.18 + Math.random() * 0.32,
        h: 0.04 + Math.random() * 0.08,
        speed: 0.000035 + Math.random() * 0.00005,
        alpha: 0.04 + Math.random() * 0.09,
        color: Math.random() < 0.5 ? [255,240,210] : [210,200,255],
      });
    }

    function drawClouds() {
      cloudSeeds.forEach(function (cl) {
        var cx = ((cl.x + t * cl.speed) % 1.3 - 0.15) * W;
        var cy = cl.y * H;
        var rw = cl.w * W * 0.5;
        var rh = cl.h * H * 0.5;
        var g = ctx.createRadialGradient(cx, cy, 0, cx, cy, rw);
        var rgb = cl.color.join(',');
        g.addColorStop(0,   'rgba(' + rgb + ',' + cl.alpha + ')');
        g.addColorStop(0.5, 'rgba(' + rgb + ',' + (cl.alpha * 0.55) + ')');
        g.addColorStop(1,   'rgba(' + rgb + ',0)');
        ctx.save();
        ctx.scale(1, rh / rw);
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(cx, cy * (rw / rh), rw, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      });
    }

    function frame() {
      t++;
      ctx.clearRect(0, 0, W, H);

      /* ── Deep heaven gradient ─────────────────────── */
      var sky = ctx.createLinearGradient(0, 0, 0, H);
      sky.addColorStop(0,   '#04010e');
      sky.addColorStop(0.25,'#080518');
      sky.addColorStop(0.55,'#0d0820');
      sky.addColorStop(0.8, '#100618');
      sky.addColorStop(1,   '#06030c');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W, H);

      /* ── Aurora rays ──────────────────────────────── */
      rays.forEach(function (ray) {
        var drift  = Math.sin(t * ray.speed + ray.phase) * 0.06;
        var cx     = (ray.x + drift) * W;
        var hw     = ray.width * W * 0.5;
        var g = ctx.createLinearGradient(cx - hw, 0, cx + hw, 0);
        var a = ray.colA, b = ray.colB;
        var alpha = ray.alpha * (0.7 + 0.3 * Math.sin(t * ray.speed * 1.3 + ray.phase));
        g.addColorStop(0,   'rgba(' + a.join(',') + ',0)');
        g.addColorStop(0.3, 'rgba(' + a.join(',') + ',' + (alpha * 0.6) + ')');
        g.addColorStop(0.5, 'rgba(' + b.join(',') + ',' + alpha + ')');
        g.addColorStop(0.7, 'rgba(' + a.join(',') + ',' + (alpha * 0.6) + ')');
        g.addColorStop(1,   'rgba(' + a.join(',') + ',0)');
        ctx.fillStyle = g;
        ctx.fillRect(cx - hw, 0, hw * 2, H * 0.72);
      });

      /* ── Cloud wisps ─────────────────────────────── */
      drawClouds();

      /* ── Stars ───────────────────────────────────── */
      stars.forEach(function (s) {
        var twinkle = 0.5 + 0.5 * Math.sin(t * s.speed * 60 + s.phase);
        var alpha   = 0.3 + 0.7 * twinkle;
        ctx.beginPath();
        ctx.arc(s.x * W, s.y * H, s.r, 0, Math.PI * 2);
        ctx.fillStyle = s.color + alpha + ')';
        ctx.fill();
        /* tiny cross-flare on brighter stars */
        if (s.r > 1.1 && twinkle > 0.75) {
          ctx.strokeStyle = s.color + (alpha * 0.35) + ')';
          ctx.lineWidth   = 0.6;
          ctx.beginPath();
          ctx.moveTo(s.x * W - s.r * 3, s.y * H);
          ctx.lineTo(s.x * W + s.r * 3, s.y * H);
          ctx.moveTo(s.x * W, s.y * H - s.r * 3);
          ctx.lineTo(s.x * W, s.y * H + s.r * 3);
          ctx.stroke();
        }
      });

      /* ── Divine orbs ─────────────────────────────── */
      orbs.forEach(function (orb) {
        orb.x += orb.speedX;
        orb.y += orb.speedY;
        if (orb.x < -0.1) orb.x = 1.1;
        if (orb.x >  1.1) orb.x = -0.1;
        if (orb.y < 0)    orb.y = 0.65;
        if (orb.y > 0.65) orb.y = 0;
        var pulse = 0.75 + 0.25 * Math.sin(t * 0.0012 + orb.phase);
        var r  = orb.r * pulse;
        var ox = orb.x * W, oy = orb.y * H;
        var g  = ctx.createRadialGradient(ox, oy, 0, ox, oy, r);
        var rgb = orb.color.join(',');
        g.addColorStop(0,   'rgba(' + rgb + ',' + orb.alpha + ')');
        g.addColorStop(0.5, 'rgba(' + rgb + ',' + (orb.alpha * 0.4) + ')');
        g.addColorStop(1,   'rgba(' + rgb + ',0)');
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(ox, oy, r, 0, Math.PI * 2);
        ctx.fill();
      });

      /* ── Central divine halo ─────────────────────── */
      drawHalo();

      requestAnimationFrame(frame);
    }
    requestAnimationFrame(frame);
  })();

  (function () {
    'use strict';

    /* ── Incense stick configs ─────────────────────────────────────── */
    var sticks = [
      { x: '20%',  height: 160, tilt:  8, coatingPct: 0.22, delay: 0 },
      { x: '22%',  height: 180, tilt: -5, coatingPct: 0.20, delay: 0.4 },
      { x: '50%',  height: 200, tilt:  0, coatingPct: 0.25, delay: 0 },
      { x: '78%',  height: 175, tilt:  6, coatingPct: 0.21, delay: 0.6 },
      { x: '80%',  height: 155, tilt: -9, coatingPct: 0.19, delay: 0.2 },
    ];

    var scene = document.getElementById('incense-scene');
    var W = window.innerWidth;
    var H = window.innerHeight;

    /* ── Build sticks ──────────────────────────────────────────────── */
    var smokeCtxs = [];

    sticks.forEach(function (cfg, idx) {
      var wrap = document.createElement('div');
      wrap.className = 'stick-wrap';
      wrap.style.left = cfg.x;
      wrap.style.transform = 'rotate(' + cfg.tilt + 'deg)';

      var totalH = cfg.height;
      var coatH  = Math.round(totalH * cfg.coatingPct);
      var woodH  = totalH - coatH;

      var tip = document.createElement('div');
      tip.className = 'stick-tip';
      tip.style.animationDelay = cfg.delay + 's';

      var coat = document.createElement('div');
      coat.className = 'stick-coating';
      coat.style.height = coatH + 'px';

      var wood = document.createElement('div');
      wood.className = 'stick-wood';
      wood.style.height = woodH + 'px';

      var holder = document.createElement('div');
      holder.className = 'stick-holder';

      /* Smoke canvas — wide enough for wispy drift */
      var cw = 80, ch = Math.round(H * 0.62);
      var canvas = document.createElement('canvas');
      canvas.className = 'smoke-canvas';
      canvas.width  = cw;
      canvas.height = ch;
      canvas.style.width  = cw + 'px';
      canvas.style.height = ch + 'px';

      wrap.appendChild(canvas);
      wrap.appendChild(tip);
      wrap.appendChild(coat);
      wrap.appendChild(wood);
      wrap.appendChild(holder);
      scene.appendChild(wrap);

      var ctx = canvas.getContext('2d');
      smokeCtxs.push({
        ctx: ctx, cw: cw, ch: ch,
        particles: [],
        frameCount: 0,
        delay: Math.round(cfg.delay * 60),
      });
    });

    /* ── Smoke particle system ─────────────────────────────────────── */
    var SMOKE_COLORS = [
      'rgba(220, 210, 200, ',
      'rgba(200, 195, 185, ',
      'rgba(185, 175, 165, ',
      'rgba(240, 230, 218, ',
    ];

    function spawnParticle(sw, ch) {
      var cx = sw / 2;
      return {
        x: cx + (Math.random() - 0.5) * 4,
        y: ch - 2,
        vx: (Math.random() - 0.5) * 0.35,
        vy: -(0.55 + Math.random() * 0.55),
        r:   1.5 + Math.random() * 2,
        life: 0,
        maxLife: 180 + Math.random() * 140,
        color: SMOKE_COLORS[Math.floor(Math.random() * SMOKE_COLORS.length)],
        wobble: (Math.random() - 0.5) * 0.018,
        wobbleAcc: 0,
      };
    }

    function tickSmoke(sm) {
      sm.frameCount++;
      if (sm.frameCount < sm.delay) return;

      /* spawn 1-2 particles every few frames */
      if (sm.frameCount % 3 === 0) {
        sm.particles.push(spawnParticle(sm.cw, sm.ch));
        if (Math.random() < 0.35) sm.particles.push(spawnParticle(sm.cw, sm.ch));
      }

      sm.ctx.clearRect(0, 0, sm.cw, sm.ch);

      sm.particles = sm.particles.filter(function (p) {
        p.life++;
        if (p.life > p.maxLife) return false;

        p.wobbleAcc += p.wobble;
        p.vx += p.wobbleAcc * 0.012;
        p.vy -= 0.004;           /* slight upward acceleration */
        p.x += p.vx;
        p.y += p.vy;
        p.r  += 0.018;           /* expands as it rises */

        var t       = p.life / p.maxLife;
        var alpha   = t < 0.12 ? t / 0.12 * 0.55
                    : t < 0.7  ? 0.55 - (t - 0.12) / 0.58 * 0.38
                    :            0.17 - (t - 0.7) / 0.3 * 0.17;
        if (alpha <= 0) return false;

        var grad = sm.ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.2);
        grad.addColorStop(0,   p.color + Math.min(alpha, 0.52) + ')');
        grad.addColorStop(0.5, p.color + alpha * 0.55 + ')');
        grad.addColorStop(1,   p.color + '0)');

        sm.ctx.beginPath();
        sm.ctx.arc(p.x, p.y, p.r * 2.2, 0, Math.PI * 2);
        sm.ctx.fillStyle = grad;
        sm.ctx.fill();
        return true;
      });
    }

    /* ── Ash particle emitter ──────────────────────────────────────── */
    function emitAsh() {
      var el   = document.createElement('div');
      el.className = 'ash';
      var sz   = 1.5 + Math.random() * 2.5;
      var xPct = 15 + Math.random() * 70;
      var yPct = 75 + Math.random() * 15;
      el.style.width  = sz + 'px';
      el.style.height = sz + 'px';
      el.style.left   = xPct + '%';
      el.style.top    = yPct + 'vh';
      el.style.setProperty('--ax', (Math.random() * 60 - 30) + 'px');
      el.style.setProperty('--ay', (20 + Math.random() * 40) + 'px');
      var dur = 3 + Math.random() * 4;
      el.style.animationDuration = dur + 's';
      el.style.animationDelay = Math.random() * 2 + 's';
      scene.appendChild(el);
      setTimeout(function () { el.remove(); }, (dur + 2.5) * 1000);
    }

    setInterval(emitAsh, 800);

    /* ── Falling marigold petals ───────────────────────────────────── */
    var PETAL_COLORS = [
      ['#fff59d', '#f9a825'],
      ['#ffecb3', '#ff8f00'],
      ['#ffe082', '#f57f17'],
      ['#fff3e0', '#e65100'],
      ['#ffccbc', '#bf360c'],
    ];

    function emitPetal() {
      var el   = document.createElement('div');
      el.className = 'petal';
      var pair = PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)];
      el.style.background = 'linear-gradient(135deg, ' + pair[0] + ' 0%, ' + pair[1] + ' 100%)';
      el.style.left   = Math.random() * 100 + '%';
      el.style.width  = 7 + Math.random() * 6 + 'px';
      el.style.height = 10 + Math.random() * 7 + 'px';
      el.style.setProperty('--pdx', (Math.random() * 120 - 60) + 'px');
      el.style.setProperty('--pr',  (Math.random() * 540 - 270) + 'deg');
      var dur = 8 + Math.random() * 8;
      el.style.animationDuration  = dur + 's';
      el.style.animationDelay     = Math.random() * 6 + 's';
      document.body.appendChild(el);
      setTimeout(function () { el.remove(); }, (dur + 7) * 1000);
    }

    for (var pi = 0; pi < 18; pi++) emitPetal();
    setInterval(emitPetal, 2200);

    /* ── Main render loop ──────────────────────────────────────────── */
    function loop() {
      smokeCtxs.forEach(tickSmoke);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    /* ── Resize handler ────────────────────────────────────────────── */
    window.addEventListener('resize', function () {
      W = window.innerWidth;
      H = window.innerHeight;
    });
  })();
  </script>
</body>
</html>
