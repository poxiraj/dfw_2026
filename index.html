<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#4a1c22" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Bihu Programme" />
  <title>Rongali Bihu — Programme</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="preload" href="dhol_beats.mp3" as="audio" type="audio/mpeg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Noto+Sans+Bengali:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f5f0e6;
      --parchment: #e8dfd0;
      --sepia: #c4a77d;
      --gold: #b8860b;
      --burgundy: #722f37;
      --deep-burgundy: #4a1c22;
      --ink: #2c1810;
      /* Typography: all primary text in blue */
      --text-blue: #0d3b66;
      --text-blue-soft: #1565a8;
      --text-blue-deep: #082f52;
      --border-gold: rgba(184, 134, 11, 0.5);
      --item-border-gold: #c9a227;
      --shadow-warm: rgba(114, 47, 55, 0.15);
      /* Letterbox / card fill behind chai.jpg (match photo’s white/cream) */
      --chai-backdrop: #faf8f5;
      /* Snacks row (sequenceId 0) — jolpaan.png */
      --snacks-backdrop: #faf8f5;
      /* Background image — overridden for touch/mobile devices below */
      --backdrop: url("mainBackDrop.png");
    }
    /* Use the mobile-optimised backdrop on phones and tablets (touch-primary devices) */
    @media (pointer: coarse) {
      :root { --backdrop: url("mainBackdropMobile.png"); }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      height: 100%;
    }

    body {
      font-family: 'Cormorant Garamond', Georgia, serif;
      color: var(--text-blue);
      height: 100%;
      max-height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-color: #2c1810;
      background-image:
        linear-gradient(rgba(245, 240, 230, 0.22) 0%, rgba(232, 223, 208, 0.18) 45%, transparent 75%),
        var(--backdrop);
      /* Full width (no wide side bars); anchor top so overflow clips at bottom, not the top */
      background-size: 100% 100%, 100% auto;
      background-position: center, center top;
      background-repeat: no-repeat, no-repeat;
      background-attachment: fixed, fixed;
    }

    .container {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      padding: max(1.25rem, env(safe-area-inset-top)) max(1.5rem, env(safe-area-inset-right)) max(0.5rem, env(safe-area-inset-bottom)) max(1.5rem, env(safe-area-inset-left));
      gap: 0.5rem;
    }

    header {
      flex-shrink: 0;
      text-align: center;
      padding: 1rem 1.25rem;
      border: 2px solid var(--border-gold);
      background: linear-gradient(135deg, var(--parchment) 0%, rgba(232, 223, 208, 0.9) 100%);
      box-shadow: 0 4px 20px var(--shadow-warm);
    }

    h1.event-title-block {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.75rem;
      color: var(--text-blue-deep);
      letter-spacing: 0.02em;
      text-transform: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.4rem;
      line-height: 1.25;
    }

    #content {
      flex: 1 1 auto;
      min-height: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding-bottom: max(0.25rem, env(safe-area-inset-bottom));
    }

    #content footer {
      text-align: center;
      font-size: 0.85rem;
      color: var(--text-blue-soft);
      opacity: 0.88;
      padding: 0.35rem 0 0;
      margin: 0;
    }

    h1.event-title-block .event-title-line {
      display: block;
    }

    h1.event-title-block .event-title-line:empty {
      display: none;
    }

    .event-list {
      list-style: none;
    }

    .event-item {
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 0.65rem 1rem;
      align-items: start;
      padding: 0.85rem 1.1rem;
      margin-bottom: 0.55rem;
      background: linear-gradient(135deg, #fffef9 0%, var(--parchment) 100%);
      border: 2px solid var(--item-border-gold);
      box-shadow: 0 2px 12px var(--shadow-warm);
      position: relative;
      scroll-margin-block: 0.85rem;
    }

    .event-item::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-gold), transparent);
      opacity: 0.6;
    }

    .event-item.current {
      border-color: var(--item-border-gold);
      border-width: 3px;
      /* Opaque fill so “current” items match other cards (no see-through to page backdrop) */
      background: linear-gradient(135deg, #f7f0f1 0%, #e8dfd4 100%);
      box-shadow: 0 3px 16px var(--shadow-warm);
    }

    .event-item.current .seq {
      background: linear-gradient(145deg, #e8c547, var(--gold));
      color: var(--text-blue-deep);
      border-color: var(--item-border-gold);
    }

    /* Admin-focused “in progress” row (programme list scrolls to show it) */
    .event-item.agenda-pinned.current {
      border-left: 5px solid var(--burgundy);
      box-shadow:
        0 3px 18px rgba(114, 47, 55, 0.2),
        inset 0 0 0 1px rgba(201, 162, 39, 0.35);
    }

    .event-item.agenda-pinned .body {
      position: relative;
    }

    .event-item.agenda-pinned .body::before {
      content: 'In progress';
      display: block;
      font-family: 'Cinzel', serif;
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--burgundy);
      margin-bottom: 0.35rem;
      opacity: 0.92;
    }

    /* Auto-advance countdown status line (shown inside item body) */
    .auto-adv-status {
      font-family: 'Cinzel', serif;
      font-size: 0.63rem;
      letter-spacing: 0.08em;
      color: var(--gold);
      margin-top: 0.3rem;
      min-height: 1em;
    }
    .event-item.agenda-pinned .auto-adv-status {
      color: var(--burgundy);
      opacity: 0.8;
    }

    /* sequenceId 39 (dinner): maincourse.png | meal.jpg */
    .event-item.dinner-showcase {
      position: relative;
      overflow: hidden;
      min-height: clamp(150px, 22vh, 300px);
      padding: 0.9rem 1.1rem;
      align-items: center;
      background-color: #3d2a22;
      background-image: none;
      border: 2px solid var(--item-border-gold);
    }

    .event-item.dinner-showcase .dinner-bg {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      z-index: 0;
      pointer-events: none;
    }

    .event-item.dinner-showcase .dinner-bg-col {
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .event-item.dinner-showcase .dinner-bg-left {
      background-image: url("maincourse.png");
    }

    .event-item.dinner-showcase .dinner-bg-right {
      background-image: url("meal.jpg");
    }

    .event-item.dinner-showcase .dinner-scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(245, 240, 230, 0.48) 0%, rgba(232, 223, 208, 0.42) 50%, rgba(245, 240, 230, 0.48) 100%);
    }

    .event-item.dinner-showcase.current {
      background-color: #3d2a22;
      background-image: none;
      box-shadow: 0 3px 16px var(--shadow-warm);
    }

    .event-item.dinner-showcase.current .dinner-scrim {
      background: linear-gradient(135deg, rgba(114, 47, 55, 0.28) 0%, rgba(245, 240, 230, 0.45) 45%, rgba(232, 223, 208, 0.5) 100%);
    }

    .event-item.dinner-showcase .seq {
      position: relative;
      z-index: 2;
      background: rgba(255, 254, 249, 0.92);
      box-shadow: 0 2px 8px rgba(44, 24, 16, 0.2);
    }

    .event-item.dinner-showcase .body,
    .event-item.dinner-showcase .time-block {
      position: relative;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 12px rgba(255, 254, 249, 0.8);
    }

    .event-item.dinner-showcase .description {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.85rem;
      line-height: 1.2;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* BREAK (Water/Tea) — chai.jpg beside description (right column before time) */
    .event-item.chai-break {
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 0.65rem 0.75rem;
      background-color: var(--chai-backdrop);
      background-image: none;
    }

    .event-item.chai-break .seq {
      background: rgba(255, 254, 249, 0.9);
      box-shadow: 0 2px 8px rgba(44, 24, 16, 0.15);
    }

    .event-item.chai-break .body {
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 254, 249, 0.75);
      max-width: min(100%, 28rem);
    }

    .event-item.chai-break .time-block {
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 254, 249, 0.75);
    }

    .event-item.chai-break .item-side-thumb-chai {
      width: 8.5rem;
      height: 8.5rem;
      flex-shrink: 0;
      background: url("chai.jpg") center / contain no-repeat;
      margin: 0 0.1rem;
    }

    /* BREAK row (e.g. sequenceId 17): reduced type scale */
    .event-item.chai-break p.description {
      font-size: 1.35rem;
      line-height: 1.35;
      min-height: calc(2 * 1.35rem * 1.35);
      white-space: normal;
    }

    .event-item.chai-break .meta-line {
      font-size: 1.05rem;
      margin-top: 0.5rem;
    }

    .event-item.chai-break .start-time {
      font-size: 1.25rem;
    }

    .event-item.chai-break .duration {
      font-size: 1.05rem;
    }

    .event-item.chai-break .seq {
      font-size: 1.2rem;
      min-width: 2.65rem;
      height: 2.65rem;
    }

    /* sequenceId 0 — jolpaan.png beside description */
    .event-item.snacks-showcase {
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      align-items: center;
      gap: 0.65rem 0.75rem;
      background-color: var(--snacks-backdrop);
      background-image: none;
    }

    .event-item.snacks-showcase .seq {
      background: rgba(255, 254, 249, 0.9);
      box-shadow: 0 2px 8px rgba(44, 24, 16, 0.15);
    }

    .event-item.snacks-showcase .body {
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 254, 249, 0.75);
      max-width: min(100%, 22rem);
    }

    .event-item.snacks-showcase .time-block {
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 254, 249, 0.75);
    }

    .event-item.snacks-showcase .item-side-thumb-snacks {
      width: 6.375rem;
      height: 6.375rem;
      flex-shrink: 0;
      background: url("jolpaan.png") center / contain no-repeat;
      margin: 0 0.1rem;
    }

    .event-item.snacks-showcase p.description {
      font-size: 1.35rem;
      line-height: 1.35;
      min-height: calc(2 * 1.35rem * 1.35);
      white-space: normal;
    }

    /* sequenceId 41 — house.jpg (letterbox matches typical wall/cream photo bg) */
    .event-item.house-showcase {
      position: relative;
      overflow: hidden;
      background-image: none;
      background-color: #ebe8e2;
    }

    .event-item.house-showcase .house-bg {
      position: absolute;
      inset: 0;
      background-color: #ebe8e2;
      /* contain = full image visible inside the row */
      background-image: url("house.jpg");
      background-position: center;
      background-size: contain;
      background-repeat: no-repeat;
      z-index: 0;
      pointer-events: none;
    }

    .event-item.house-showcase .house-scrim {
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      /* Light wash only — photo stays bright */
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.22) 0%, rgba(245, 242, 237, 0.14) 100%);
    }

    .event-item.house-showcase.current .house-scrim {
      background: linear-gradient(135deg, rgba(114, 47, 55, 0.08) 0%, rgba(255, 255, 255, 0.2) 100%);
    }

    .event-item.house-showcase .seq,
    .event-item.house-showcase .body,
    .event-item.house-showcase .time-block {
      position: relative;
      z-index: 2;
      text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9), 0 0 10px rgba(255, 254, 249, 0.75);
    }

    .event-item .body { min-width: 0; }

    .seq {
      font-family: 'Cinzel', serif;
      font-weight: 600;
      font-size: 1rem;
      color: var(--text-blue-deep);
      min-width: 2.5rem;
      height: 2.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(145deg, var(--cream), var(--sepia));
      border: 1px solid var(--item-border-gold);
      border-radius: 2px;
    }

    .time-block {
      text-align: right;
      min-width: 100px;
    }

    .start-time {
      font-family: 'Cinzel', serif;
      font-size: 1rem;
      color: var(--text-blue-soft);
      font-weight: 600;
    }

    .duration {
      font-size: 0.85rem;
      color: var(--text-blue);
      opacity: 0.85;
    }

    .description {
      font-size: 1.02rem;
      line-height: 1.4;
      color: var(--text-blue);
    }

    .meta-line {
      font-size: 0.85rem;
      color: var(--text-blue-soft);
      margin-top: 0.25rem;
      opacity: 0.92;
    }

    .meta-line.meta-presenter .meta-label {
      font-weight: 600;
      margin-right: 0.25rem;
    }

    .event-item .description-large {
      font-size: 1.5rem;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    .event-item .description-largeBold {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      font-family: 'Cinzel', serif;
    }

    .loading, .error {
      text-align: center;
      padding: 1rem 0.75rem;
      font-size: 1.05rem;
      color: var(--text-blue-soft);
    }

    .error {
      background: rgba(21, 101, 168, 0.08);
      border: 2px solid var(--item-border-gold);
    }

    /* Fixed backgrounds often break or stutter on mobile; scroll behaves reliably */
    @media (max-width: 900px) {
      body {
        background-attachment: scroll, scroll;
      }
    }

    @media (max-width: 640px) {
      .container {
        padding-left: max(0.75rem, env(safe-area-inset-left));
        padding-right: max(0.75rem, env(safe-area-inset-right));
        padding-top: max(0.65rem, env(safe-area-inset-top));
        padding-bottom: max(0.35rem, env(safe-area-inset-bottom));
      }

      #content {
        padding-bottom: max(0.2rem, env(safe-area-inset-bottom));
      }

      header {
        padding: 1rem 0.85rem;
      }

      h1.event-title-block {
        font-size: clamp(1rem, 4.5vw + 0.35rem, 1.75rem);
        letter-spacing: 0.02em;
      }

      /* Stack: seq + body on row 1; time (and optional thumb) below — avoids crushed columns */
      .event-item {
        grid-template-columns: auto 1fr;
        grid-template-rows: auto auto;
        gap: 0.5rem 0.75rem;
        padding: 0.7rem 0.8rem;
        margin-bottom: 0.45rem;
      }

      .event-item .seq {
        grid-column: 1;
        grid-row: 1;
        align-self: start;
      }

      .event-item .body {
        grid-column: 2;
        grid-row: 1;
        min-width: 0;
        overflow-wrap: anywhere;
      }

      .event-item .time-block {
        grid-column: 1 / -1;
        grid-row: 2;
        text-align: left;
        min-width: 0;
        padding-top: 0.35rem;
        border-top: 1px solid rgba(201, 162, 39, 0.35);
        display: flex;
        flex-wrap: wrap;
        align-items: baseline;
        gap: 0.35rem 1rem;
      }

      .event-item.chai-break .item-side-thumb-chai,
      .event-item.snacks-showcase .item-side-thumb-snacks {
        grid-column: 1 / -1;
        grid-row: 2;
        justify-self: center;
        width: min(7.5rem, 28vw);
        height: min(7.5rem, 28vw);
        margin: 0.15rem 0 0.35rem;
      }

      .event-item.chai-break .time-block,
      .event-item.snacks-showcase .time-block {
        grid-row: 3;
        border-top: none;
        padding-top: 0.25rem;
      }

      .event-item.chai-break,
      .event-item.snacks-showcase {
        grid-template-rows: auto auto auto;
      }

      .event-item.chai-break p.description,
      .event-item.snacks-showcase p.description {
        min-height: 0;
      }

      .event-item.dinner-showcase {
        min-height: clamp(120px, 26vh, 240px);
        padding: 0.65rem 0.8rem;
      }

      .event-item.dinner-showcase .dinner-bg {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 1fr;
      }

      .event-item.dinner-showcase .description {
        font-size: clamp(1rem, 4.2vw + 0.4rem, 1.5rem);
      }

      .event-item .description-large,
      .event-item .description-largeBold {
        font-size: clamp(1.15rem, 3.5vw + 0.5rem, 1.45rem);
      }

      .time-block .start-time {
        font-size: 0.95rem;
      }

      .time-block .duration {
        font-size: 0.8rem;
      }
    }

    @media (max-width: 380px) {
      .seq {
        min-width: 2.15rem;
        height: 2.15rem;
        font-size: 0.9rem;
      }
    }

    /* First-load celebration: Holi-style bursts + flower petals (~15s) */
    .celebration-overlay {
      position: fixed;
      inset: 0;
      z-index: 10000;
      pointer-events: none;
      overflow: hidden;
      transition: opacity 0.85s ease;
    }

    .celebration-overlay.celebration-overlay--fade {
      opacity: 0;
    }

    .celebration-burst {
      position: absolute;
      width: 0;
      height: 0;
      left: var(--bx, 50%);
      top: var(--by, 50%);
      transform: translate(-50%, -50%);
    }

    .celebration-burst::before,
    .celebration-burst::after {
      content: '';
      position: absolute;
      left: 50%;
      top: 50%;
      width: 7vmin;
      height: 7vmin;
      margin: -3.5vmin 0 0 -3.5vmin;
      border-radius: 50%;
      background: radial-gradient(circle, var(--c, #ff1493) 0%, var(--c-mid, transparent) 38%, transparent 72%);
      animation: celebration-burst-ring 0.95s ease-out forwards;
      animation-delay: var(--bdelay, 0s);
      opacity: 0;
      filter: saturate(1.35);
    }

    .celebration-burst::after {
      animation-delay: calc(var(--bdelay, 0s) + 0.1s);
      width: 5vmin;
      height: 5vmin;
      margin: -2.5vmin 0 0 -2.5vmin;
      background: radial-gradient(circle, var(--c2, #ffeb3b) 0%, transparent 68%);
    }

    @keyframes celebration-burst-ring {
      0% {
        transform: scale(0.15);
        opacity: 1;
      }
      100% {
        transform: scale(18);
        opacity: 0;
      }
    }

    .celebration-powder {
      position: absolute;
      left: var(--px, 50%);
      top: var(--py, 50%);
      width: 9vmin;
      height: 9vmin;
      margin: -4.5vmin 0 0 -4.5vmin;
      border-radius: 48% 52% 50% 50%;
      background:
        radial-gradient(ellipse 70% 55% at 28% 32%, var(--pow1, #ff1744) 0%, transparent 52%),
        radial-gradient(ellipse 60% 70% at 72% 58%, var(--pow2, #00e5ff) 0%, transparent 48%),
        radial-gradient(circle at 50% 48%, var(--pow3, #ffea00) 0%, transparent 62%);
      opacity: 0.95;
      animation: celebration-powder-puff 1.05s ease-out forwards;
      animation-delay: var(--pdelay, 0s);
      filter: saturate(1.45);
    }

    @keyframes celebration-powder-puff {
      0% {
        transform: scale(0.12) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: scale(15) rotate(25deg);
        opacity: 0;
      }
    }

    .celebration-spark {
      position: absolute;
      left: var(--sx, 50%);
      top: var(--sy, 50%);
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--sc, #fff);
      box-shadow:
        0 0 8px 3px var(--sc),
        22px 0 0 -1px var(--sc2, #ffea00),
        -20px 10px 0 -1px var(--sc3, #ff1744),
        12px -18px 0 -1px var(--sc4, #00e676),
        -14px -14px 0 -1px var(--sc5, #651fff),
        16px 14px 0 -1px var(--sc6, #ff9100),
        -22px -6px 0 -1px var(--sc7, #00b0ff);
      animation: celebration-spark-pop 0.6s ease-out forwards;
      opacity: 0;
      filter: saturate(1.4);
    }

    @keyframes celebration-spark-pop {
      0% {
        transform: scale(0);
        opacity: 1;
      }
      100% {
        transform: scale(1);
        opacity: 0;
      }
    }

    .celebration-petal {
      position: absolute;
      top: -4vh;
      width: 14px;
      height: 20px;
      border-radius: 50% 50% 50% 0;

<body>
  <div class="container">
    <header>
      <h1 class="event-title-block" id="event-title">
        <span class="event-title-line" id="event-title-1"></span>
        <span class="event-title-line" id="event-title-2"></span>
      </h1>
    </header>
    <div id="content">
      <div id="programme-root">
        <p class="loading">Loading programme…</p>
      </div>
      <footer>Rongali Bihu — DFW</footer>
    </div>
  </div>
  <!-- Audio element for dhol music; playback is controlled exclusively by the Admin page. -->
  <audio id="dhol-beats-audio" preload="auto" playsinline src="dhol_beats.mp3"></audio>
  <script>
    (function dholAudioControl() {
      const MUSIC_KEY = 'dholMusicState';
      const a = document.getElementById('dhol-beats-audio');
      if (!a) return;
      a.loop = false;
      let _unlocked = false; // true once audio has played at least once in this tab

      /** Play or pause based on the admin-set state in localStorage. */
      function _sync() {
        const shouldPlay = localStorage.getItem(MUSIC_KEY) === 'playing';
        if (shouldPlay) {
          if (a.paused) {
            a.play().then(function () { _unlocked = true; }).catch(function () {});
          }
        } else {
          if (!a.paused) a.pause();
        }
      }

      /**
       * Called on first user interaction (pointermove / click / touchstart).
       * Browsers require a user gesture before audio can play.  _sync() is now
       * also called every second via the updateAutoAdvStatus polling loop, so
       * audio starts within ~1s of any interaction on this page.
       */
      function _onGesture() {
        if (localStorage.getItem(MUSIC_KEY) !== 'playing') return; // admin hasn't requested play
        if (!a.paused) { _unlocked = true; _detachGesture(); return; }
        a.play().then(function () {
          _unlocked = true;
          _detachGesture();
        }).catch(function () {});
      }

      function _detachGesture() {
        document.removeEventListener('pointermove', _onGesture);
        document.removeEventListener('click',       _onGesture);
        document.removeEventListener('touchstart',  _onGesture);
      }

      // Lightweight gesture listeners — only activate audio when admin has requested it
      document.addEventListener('pointermove', _onGesture, { passive: true });
      document.addEventListener('click',       _onGesture, { passive: true });
      document.addEventListener('touchstart',  _onGesture, { passive: true });

      // Expose sync for 1-second polling (called by updateAutoAdvStatus as a fallback)
      window.syncDholAudio = _sync;

      // React to admin toggling music from the admin tab — always try _sync()
      // play() is silently rejected by the browser if no gesture yet; gesture
      // listeners above will catch it on the user's first interaction in this tab
      window.addEventListener('storage', function (e) {
        if (e.key !== MUSIC_KEY) return;
        _sync();
      });
    })();

    /* ── Server-Sent Events: real-time cross-device admin control ─────────── *
     * Connects to /control-stream so admin.html actions on one device (laptop) *
     * instantly reach this page on any other device (iPad, phone) on the same  *
     * network.  Falls back gracefully to the localStorage polling path if the  *
     * server is not available (e.g. opened via file://).                       */
    (function setupControlStream() {
      if (!window.EventSource) return; // very old browser — polling handles it

      function connect() {
        var es = new window.EventSource('/control-stream');

        es.onmessage = function (e) {
          try {
            var state = JSON.parse(e.data);

            // ── Focus override (admin clicked a different item) ──────────────
            // This is the key cross-device path: admin on laptop, display on iPad.
            // 'focus' is sent as a transient broadcast (not persisted on the server),
            // so it only arrives when the admin explicitly changes the focused item.
            if ('focus' in state) {
              if (state.focus !== null && state.focus !== undefined) {
                // Admin focused a specific item — override whatever is running now
                if (window.applyFocusOverride) {
                  window.applyFocusOverride(state.focus.seqId, state.focus.startedAt);
                }
              } else {
                // Admin cleared the focus (stop / reset)
                if (window.clearFocusOverride) window.clearFocusOverride();
              }
              return; // focus messages carry no other keys
            }

            // ── Music & banner (update localStorage then call sync) ──────────
            if (state.music !== undefined) {
              try { localStorage.setItem('dholMusicState', state.music); } catch (_) {}
              if (window.syncDholAudio) window.syncDholAudio();
            }
            if (state.banner !== undefined) {
              try { localStorage.setItem('manualBannerState', state.banner); } catch (_) {}
              if (window.syncManualBanner) window.syncManualBanner();
            }
          } catch (_) {}
        };

        es.onerror = function () {
          // EventSource reconnects automatically — nothing to do here.
          // If the server is unreachable (file:// mode), it just keeps retrying
          // silently and the 1-second polling loop handles any state.
        };
      }

      // Small delay so all IIFEs finish defining window.sync* before the first
      // SSE message arrives (the server sends state immediately on connect)
      setTimeout(connect, 50);
    })();

    (function celebrationEntrance() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
      const overlay = document.createElement('div');
      overlay.className = 'celebration-overlay';
      overlay.setAttribute('aria-hidden', 'true');

      /* Holi gulal palette — hot pink, cyan, saffron, lime, magenta, indigo, etc. */
      const holi = [
        '#FF1744', '#F50057', '#E91E63', '#FF4081', '#FF9100', '#FF6D00', '#FFEA00', '#FFEB3B',
        '#76FF03', '#00E676', '#1DE9B6', '#00BFA5', '#00B0FF', '#00E5FF', '#2979FF', '#651FFF',
        '#D500F9', '#E040FB', '#AB47BC', '#7C4DFF', '#536DFE', '#FF4081', '#FFFF00', '#EEFF41'
      ];
      function pickHoli(a, b) {
        return holi[(a * 7 + b * 13) % holi.length];
      }

      const petalTriads = [
        ['#ffcdd2', '#e91e63', '#fff59d'],
        ['#f8bbd9', '#c2185b', '#ffe082'],
        ['#ffecb3', '#ff6f00', '#fff9c4'],
        ['#c8e6c9', '#2e7d32', '#e8f5e9'],
        ['#b3e5fc', '#0277bd', '#e1f5fe'],
        ['#e1bee7', '#6a1b9a', '#f3e5f5'],
        ['#ffccbc', '#bf360c', '#fff3e0'],
        ['#f8bbd9', '#ad1457', '#fce4ec'],
        ['#d1c4e9', '#4527a0', '#ede7f6'],
        ['#b2ebf2', '#00838f', '#e0f7fa'],
        ['#fff176', '#f57f17', '#fffde7'],
        ['#ffab91', '#d84315', '#fbe9e7']
      ];

      const span = 13.5;
      for (let i = 0; i < 38; i++) {
        const b = document.createElement('div');
        b.className = 'celebration-burst';
        b.style.setProperty('--bx', Math.random() * 96 + 2 + '%');
        b.style.setProperty('--by', Math.random() * 88 + 6 + '%');
        const c = holi[i % holi.length];
        const c2 = holi[(i + 5) % holi.length];
        b.style.setProperty('--c', c);
        b.style.setProperty('--c-mid', c + '99');
        b.style.setProperty('--c2', c2);
        b.style.setProperty('--bdelay', Math.random() * span + 's');
        overlay.appendChild(b);
      }

      for (let i = 0; i < 34; i++) {
        const d = document.createElement('div');
        d.className = 'celebration-powder';
        d.style.setProperty('--px', Math.random() * 100 + '%');
        d.style.setProperty('--py', Math.random() * 100 + '%');
        d.style.setProperty('--pow1', pickHoli(i, 1));
        d.style.setProperty('--pow2', pickHoli(i, 2));
        d.style.setProperty('--pow3', pickHoli(i, 3));
        d.style.setProperty('--pdelay', Math.random() * span + 's');
        overlay.appendChild(d);
      }

      for (let i = 0; i < 32; i++) {
        const s = document.createElement('div');
        s.className = 'celebration-spark';
        s.style.setProperty('--sx', Math.random() * 100 + '%');
        s.style.setProperty('--sy', Math.random() * 100 + '%');
        s.style.setProperty('--sc', holi[(i + 2) % holi.length]);
        s.style.setProperty('--sc2', holi[(i + 1) % holi.length]);
        s.style.setProperty('--sc3', holi[(i + 3) % holi.length]);
        s.style.setProperty('--sc4', holi[(i + 4) % holi.length]);
        s.style.setProperty('--sc5', holi[(i + 5) % holi.length]);
        s.style.setProperty('--sc6', holi[(i + 6) % holi.length]);
        s.style.setProperty('--sc7', holi[(i + 7) % holi.length]);
        s.style.animationDelay = Math.random() * span + 's';
        overlay.appendChild(s);
      }

      for (let i = 0; i < 120; i++) {
        const p = document.createElement('div');
        p.className = 'celebration-petal';
        const [c1, c2, c3] = petalTriads[i % petalTriads.length];
        p.style.setProperty('--pc1', c1);
        p.style.setProperty('--pc2', c2);
        p.style.setProperty('--pc3', c3);
        p.style.left = Math.random() * 100 + '%';
        p.style.width = 9 + Math.random() * 12 + 'px';
        p.style.height = 12 + Math.random() * 16 + 'px';
        p.style.setProperty('--drift', Math.random() * 200 - 100 + 'px');
        p.style.setProperty('--rot', 360 + Math.random() * 1080 + 'deg');
        p.style.animationDuration = 4.2 + Math.random() * 4.5 + 's';
        p.style.animationDelay = Math.random() * 4.5 + 's';
        p.style.opacity = String(0.72 + Math.random() * 0.26);
        overlay.appendChild(p);
      }

      document.body.appendChild(overlay);
      window.setTimeout(function () {
        overlay.classList.add('celebration-overlay--fade');
        window.setTimeout(function () {
          overlay.remove();
        }, 900);
      }, 15000);
    })();

    const STORAGE_KEY = 'culturalEventProgramme';
    const contentEl = document.getElementById('programme-root');

    function pickNameField(data, primary, typo) {
      if (!data) return '';
      if (data[primary] != null && String(data[primary]).trim() !== '') return String(data[primary]).trim();
      if (typo && data[typo] != null && String(data[typo]).trim() !== '') return String(data[typo]).trim();
      return '';
    }

    function applyEventTitles(data) {
      const el1 = document.getElementById('event-title-1');
      const el2 = document.getElementById('event-title-2');
      if (!el1 || !el2) return;
      const n1 = pickNameField(data, 'eventName1', 'evnetName1');
      const n2 = pickNameField(data, 'eventName2', 'evnetName2');
      if (n1 || n2) {
        el1.textContent = n1;
        el2.textContent = n2;
        return;
      }
      if (data && data.eventName != null && String(data.eventName).trim() !== '') {
        el1.textContent = String(data.eventName).trim();
        el2.textContent = '';
        return;
      }
      el1.textContent = 'Programme';
      el2.textContent = '';
    }

    function escapeHtml(text) {
      if (text == null) return '';
      const div = document.createElement('div');
      div.textContent = String(text);
      return div.innerHTML;
    }

    /** 12-hour display with AM/PM (data stays 24h). Strips :ss for display. */
    function formatTimeForDisplay(t) {
      if (t == null || t === '') return '—';
      const str = String(t).trim();
      const m = str.match(/^(\d{1,2}):(\d{2})(?::\d{2})?$/);
      if (!m) return str;
      const h24 = parseInt(m[1], 10);
      const min = m[2];
      if (Number.isNaN(h24) || h24 < 0 || h24 > 23) return str;
      const period = h24 >= 12 ? 'PM' : 'AM';
      const h12 = h24 % 12 === 0 ? 12 : h24 % 12;
      return `${h12}:${min} ${period}`;
    }

    /** @returns {number|null} minutes from midnight (fractional if seconds) */
    function timeToMinutes(t) {
      if (t == null) return null;
      if (typeof t !== 'string') return null;
      const m = t.trim().match(/^(\d{1,2}):(\d{2})(?::(\d{2}))?$/);
      if (!m) return null;
      const h = parseInt(m[1], 10);
      const min = parseInt(m[2], 10);
      const sec = m[3] != null ? parseInt(m[3], 10) : 0;
      return h * 60 + min + sec / 60;
    }

    function nowAsMinutes() {
      const now = new Date();
      return now.getHours() * 60 + now.getMinutes() + now.getSeconds() / 60;
    }

    function numericDuration(item) {
      const d = item.durationMinutes;
      return typeof d === 'number' && !Number.isNaN(d) ? d : null;
    }

    function itemEndMinutes(item, items, i) {
      const start = timeToMinutes(item.expectedStartTime);
      if (start == null) return null;
      const d = numericDuration(item);
      if (d != null) return start + d;
      for (let j = i + 1; j < items.length; j++) {
        const ns = timeToMinutes(items[j].expectedStartTime);
        if (ns != null) return ns;
      }
      return start + 30;
    }

    function getCurrentItemIndex(items) {
      const nowMins = nowAsMinutes();
      for (let i = 0; i < items.length; i++) {
        const start = timeToMinutes(items[i].expectedStartTime);
        if (start == null) continue;
        const end = itemEndMinutes(items[i], items, i);
        if (end != null && nowMins >= start && nowMins < end) return i;
      }
      return -1;
    }

    /** Admin-selected “current” item by sequenceId; list order unchanged — item is scrolled into view and highlighted. */
    function hasManualAgendaHighlight(data) {
      if (!data) return false;
      const v = data.manualCurrentSequenceId;
      return v !== undefined && v !== null && v !== '';
    }

    /* ── Auto-advance timer ───────────────────────────────────────────────── */
    let _autoAdvanceTimer = null;

    /**
     * Returns the current auto-advance phase based on data.autoAdvanceStartedAt:
     *   'performing' - item is live; durationMinutes still counting down
     *   'prep'       - duration elapsed; waiting for next item's prepTime
     *   'advance'    - both elapsed; caller should move to the next item
     *   'done'       - last item finished; caller should clear the highlight
     * Returns null when auto-advance is not active.
     */
    function getAutoAdvanceState(data) {
      if (!hasManualAgendaHighlight(data)) return null;
      if (!data.autoAdvanceStartedAt) return null;
      const items = data.items || [];
      const key = String(data.manualCurrentSequenceId);
      const currentIdx = items.findIndex(function (it) { return String(it.sequenceId) === key; });
      if (currentIdx < 0) return null;
      const currentItem = items[currentIdx];
      const durationMs = Math.max(0, Number(currentItem.durationMinutes) || 0) * 60000;
      const elapsed = Date.now() - data.autoAdvanceStartedAt;
      if (elapsed < durationMs) {
        return { phase: 'performing', currentIdx: currentIdx, remainingMs: durationMs - elapsed };
      }
      const nextIdx = currentIdx + 1;
      if (nextIdx >= items.length) {
        return { phase: 'done', currentIdx: currentIdx };
      }
      const nextItem = items[nextIdx];
      const prepMs = Math.max(0, Number(nextItem.prepTime) || 0) * 60000;
      const prepElapsed = elapsed - durationMs;
      if (prepElapsed < prepMs) {
        return { phase: 'prep', currentIdx: currentIdx, nextIdx: nextIdx, remainingMs: prepMs - prepElapsed };
      }
      return { phase: 'advance', currentIdx: currentIdx, nextIdx: nextIdx };
    }

    /**
     * @returns {{ ordered: typeof items, currentIndex: number, agendaPinned: boolean }}
     */
    function getAgendaViewState(data) {
      const items = data && Array.isArray(data.items) ? data.items : [];
      const ordered = items.slice();
      let currentIndex = getCurrentItemIndex(items);
      let agendaPinned = false;

      if (hasManualAgendaHighlight(data)) {
        const key = String(data.manualCurrentSequenceId);
        const idx = items.findIndex(function (it) {
          return String(it.sequenceId) === key;
        });
        if (idx >= 0) {
          currentIndex = idx;
          // Show "In Progress" badge only while actively performing (not during prep wait)
          const advState = getAutoAdvanceState(data);
          agendaPinned = !advState || advState.phase === 'performing';
        }
      }

      return { ordered: ordered, currentIndex: currentIndex, agendaPinned: agendaPinned };
    }

    /** Scroll the programme list so the row for this sequence id is visible (#content is the scroller). */
    function scrollProgrammeItemIntoView(sequenceIdKey) {
      const list = contentEl.querySelector('.event-list');
      if (!list || sequenceIdKey == null) return;
      const key = String(sequenceIdKey);
      const nodes = list.querySelectorAll('.event-item');
      for (let i = 0; i < nodes.length; i++) {
        if (nodes[i].getAttribute('data-sequence-id') === key) {
          nodes[i].scrollIntoView({ block: 'center', behavior: 'smooth' });
          return;
        }
      }
    }

    /* ── Auto-advance scheduling ──────────────────────────────────────────── */

    /** Move manualCurrentSequenceId to items[nextIdx] and restart the timer. */
    function _doAdvanceToNext(nextIdx) {
      const freshData = getData();
      if (!freshData) return;
      const items = freshData.items || [];
      const nextItem = items[nextIdx];
      if (!nextItem) { _clearAutoAdvance(); return; }
      const n = Number(nextItem.sequenceId);
      freshData.manualCurrentSequenceId = Number.isNaN(n) ? nextItem.sequenceId : n;
      freshData.autoAdvanceStartedAt = Date.now();
      saveData(freshData);
      renderProgramme(freshData, true);
      if (window.updateAmbientAnimation) window.updateAmbientAnimation(freshData);
      scheduleAutoAdvance(freshData);
    }

    /** All items done — remove manual highlight and auto-advance data. */
    function _clearAutoAdvance() {
      const freshData = getData();
      if (!freshData) return;
      delete freshData.manualCurrentSequenceId;
      delete freshData.autoAdvanceStartedAt;
      saveData(freshData);
      renderProgramme(freshData, false);
      if (window.updateAmbientAnimation) window.updateAmbientAnimation(freshData);
    }

    /**
     * Schedule the next auto-advance timeout based on the current state.
     * Cancels any previously pending timer first.
     */
    function scheduleAutoAdvance(data) {
      if (_autoAdvanceTimer !== null) {
        clearTimeout(_autoAdvanceTimer);
        _autoAdvanceTimer = null;
      }
      const state = getAutoAdvanceState(data);
      if (!state) return;

      if (state.phase === 'advance') {
        _doAdvanceToNext(state.nextIdx);
        return;
      }
      if (state.phase === 'done') {
        _clearAutoAdvance();
        return;
      }
      if (state.phase === 'performing') {
        // When duration ends, re-evaluate (will be 'prep' or 'advance' or 'done')
        _autoAdvanceTimer = setTimeout(function () {
          _autoAdvanceTimer = null;
          const d = getData();
          if (!d) return;
          refresh();            // drop "In Progress" badge immediately
          scheduleAutoAdvance(d);
        }, state.remainingMs);
      } else if (state.phase === 'prep') {
        // Remove "In Progress" now; advance when prep time expires
        refresh();
        _autoAdvanceTimer = setTimeout(function () {
          _autoAdvanceTimer = null;
          _doAdvanceToNext(state.nextIdx);
        }, state.remainingMs);
      }
    }

    /**
     * Called by the SSE handler when admin sets a new focus item from any device.
     * Overrides whatever is currently "In Progress" and restarts auto-advance
     * from the given item — exactly as if the admin had clicked the focus button
     * on this same device.
     */
    window.applyFocusOverride = function (seqId, startedAt) {
      const data = getData();
      if (!data || !data.items) return;
      const n = Number(seqId);
      data.manualCurrentSequenceId = Number.isNaN(n) ? seqId : n;
      data.autoAdvanceStartedAt    = Number(startedAt) || Date.now();
      saveData(data);
      renderProgramme(data, true);
      scheduleAutoAdvance(data);
      if (window.updateAmbientAnimation) window.updateAmbientAnimation(data);
    };

    /** Called by the SSE handler when admin clears the focus (stop auto-advance). */
    window.clearFocusOverride = function () {
      const data = getData();
      if (!data) return;
      delete data.manualCurrentSequenceId;
      delete data.autoAdvanceStartedAt;
      saveData(data);
      renderProgramme(data, false);
      scheduleAutoAdvance(data);
      if (window.updateAmbientAnimation) window.updateAmbientAnimation(data);
    };

    /** Update the per-item countdown text every second (called by 1-second interval). */
    function updateAutoAdvStatus() {
      const data = getData();
      if (window.checkAndShowAlert)  window.checkAndShowAlert(data);
      if (window.syncDholAudio)      window.syncDholAudio();      // polling fallback for admin audio toggle
      if (window.syncManualBanner)   window.syncManualBanner();   // polling fallback for admin banner toggle
      const state = getAutoAdvanceState(data);
      const allStatus = document.querySelectorAll('.auto-adv-status');
      allStatus.forEach(function (el) { el.textContent = ''; });
      if (!state) return;
      const items = data.items || [];

      function fmtMs(ms) {
        const totalSecs = Math.max(0, Math.round(ms / 1000));
        const m = Math.floor(totalSecs / 60);
        const s = totalSecs % 60;
        return m + ':' + String(s).padStart(2, '0');
      }

      if (state.phase === 'performing') {
        const item = items[state.currentIdx];
        if (!item) return;
        const sid = item.sequenceId != null ? String(item.sequenceId) : '';
        const el = document.querySelector('.auto-adv-status[data-adv-id="' + sid + '"]');
        if (el) el.textContent = fmtMs(state.remainingMs) + ' remaining';
      } else if (state.phase === 'prep') {
        const nextItem = items[state.nextIdx];
        if (!nextItem) return;
        const sid = String(nextItem.sequenceId);
        const el = document.querySelector('.auto-adv-status[data-adv-id="' + sid + '"]');
        if (el) el.textContent = 'Prep: ' + fmtMs(state.remainingMs);
      }
    }

    /* ── Ambient petal / spray animation ─────────────────────────────────── */
    (function setupAmbientAnimation() {
      const _holiAmb = [
        '#FF1744','#F50057','#E91E63','#FF9100','#FFEA00',
        '#76FF03','#00E676','#00B0FF','#00E5FF','#651FFF',
        '#D500F9','#E040FB','#FF4081','#FFFF00'
      ];
      const _petalAmb = [
        ['#ffcdd2','#e91e63','#fff59d'],
        ['#f8bbd9','#c2185b','#ffe082'],
        ['#ffecb3','#ff6f00','#fff9c4'],
        ['#c8e6c9','#2e7d32','#e8f5e9'],
        ['#b3e5fc','#0277bd','#e1f5fe'],
        ['#e1bee7','#6a1b9a','#f3e5f5'],
        ['#ffccbc','#bf360c','#fff3e0'],
        ['#f8bbd9','#ad1457','#fce4ec']
      ];
      let _petalIdx = 0, _holiIdx = 0;
      let _overlay = null;
      let _timer = null;
      let _mode = 'off';

      function _ensureOverlay() {
        if (!_overlay) {
          _overlay = document.createElement('div');
          _overlay.id = 'ambient-overlay';
          _overlay.setAttribute('aria-hidden', 'true');
          _overlay.style.cssText = 'position:fixed;inset:0;z-index:9998;pointer-events:none;overflow:hidden;';
          document.body.appendChild(_overlay);
        }
        return _overlay;
      }

      function _spawnPetal(small) {
        const ov = _ensureOverlay();
        const [c1, c2, c3] = _petalAmb[_petalIdx++ % _petalAmb.length];
        const p = document.createElement('div');
        p.className = 'celebration-petal ambient-petal';
        p.style.setProperty('--pc1', c1);
        p.style.setProperty('--pc2', c2);
        p.style.setProperty('--pc3', c3);
        p.style.left = Math.random() * 100 + '%';
        const w = small ? 5 + Math.random() * 7 : 7 + Math.random() * 11;
        p.style.width = w + 'px';
        p.style.height = (w * 1.4) + 'px';
        p.style.setProperty('--drift', (Math.random() * 120 - 60) + 'px');
        p.style.setProperty('--rot', (360 + Math.random() * 720) + 'deg');
        const dur = 5.5 + Math.random() * 4.5;
        p.style.animationDuration = dur + 's';
        p.style.animationDelay = '0s';
        ov.appendChild(p);
        setTimeout(function () { if (p.parentNode) p.remove(); }, (dur + 0.3) * 1000);
      }

      function _spawnPowder() {
        const ov = _ensureOverlay();
        const i = _holiIdx++;
        const d = document.createElement('div');
        d.className = 'celebration-powder';
        d.style.setProperty('--px', Math.random() * 100 + '%');
        d.style.setProperty('--py', Math.random() * 70 + '%');
        d.style.setProperty('--pow1', _holiAmb[i % _holiAmb.length]);
        d.style.setProperty('--pow2', _holiAmb[(i + 4) % _holiAmb.length]);
        d.style.setProperty('--pow3', _holiAmb[(i + 8) % _holiAmb.length]);
        d.style.setProperty('--pdelay', '0s');
        ov.appendChild(d);
        setTimeout(function () { if (d.parentNode) d.remove(); }, 1400);
      }

      function _setMode(mode) {
        if (_mode === mode) return;
        _mode = mode;
        if (_timer !== null) { clearInterval(_timer); _timer = null; }
        if (mode === 'off') return;
        if (mode === 'mild') {
          // ~1-2 small petals every 900ms — very gentle
          _timer = setInterval(function () {
            _spawnPetal(true);
            if (Math.random() < 0.35) _spawnPetal(true);
          }, 900);
        } else if (mode === 'moderate') {
          // ~3 petals + occasional powder every 380ms — noticeable but not hectic
          _timer = setInterval(function () {
            _spawnPetal(false);
            _spawnPetal(false);
            if (Math.random() < 0.55) _spawnPetal(false);
            if (Math.random() < 0.4) _spawnPowder();
          }, 380);
        }
      }

      /**
       * Determine the desired animation mode from the current In-Progress sequenceId:
       *   - No item / seq 0   → mild (pre-show atmosphere)
       *   - seq 1             → off  (Welcome Address: quiet)
       *   - seq 2–16          → off
       *   - seq 17            → mild (resumes)
       *   - seq 18–38         → off
       *   - seq 39            → moderate (dinner celebration)
       *   - seq 40+           → off
       */
      window.updateAmbientAnimation = function (data) {
        if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) { _setMode('off'); return; }
        const sid = data ? data.manualCurrentSequenceId : null;
        let mode = 'mild'; // default: mild when nothing is In Progress
        if (sid != null && sid !== '') {
          const n = Number(sid);
          if (n === 0)                         mode = 'mild';
          else if (n === 1)                    mode = 'off';
          else if (n >= 2  && n <= 16)         mode = 'off';
          else if (n === 17)                   mode = 'mild';
          else if (n >= 18 && n <= 38)         mode = 'off';
          else if (n === 39)                   mode = 'moderate';
          else                                 mode = 'off';
        }
        _setMode(mode);
      };
    })();
    /* ─────────────────────────────────────────────────────────────────────── */

    /* ── Announcement alert banners with analog countdown clock ───────────── */
    (function setupAlertBanners() {
      const CONFIGS = [
        {
          seqId: 0,
          alertBeforeMs: 10 * 60000,
          message: 'The order of the evening is about to begin, soon. Please take your seats.'
        },
        {
          seqId: 17,
          alertBeforeMs: 10 * 60000,
          message: 'We are about to resume our programs. Please take your seats!'
        },
        {
          seqId: 39,
          alertBeforeMs: 10 * 60000,
          message: 'Mukoli Bihu session is about to begin. Please come to the stage to participate!'
        }
      ];

      let _shownKey        = null;   // tracks which (seqId_startTime) has been shown
      let _endTime         = null;   // absolute ms timestamp when countdown ends (null = no countdown)
      let _manualStartTime = null;   // absolute ms timestamp when manual banner was shown
      let _clockIv         = null;   // setInterval handle for timer ticks
      let _isManual        = false;  // true when banner was opened by admin toggle
      const MANUAL_KEY = 'manualBannerState';

      function _p2(n) { return String(n).padStart(2, '0'); }

      /** Lazily create (or return existing) banner DOM node. */
      function _getBanner() {
        var el = document.getElementById('alert-banner');
        if (!el) {
          el = document.createElement('div');
          el.id = 'alert-banner';
          el.setAttribute('role', 'alertdialog');
          el.innerHTML =
            '<div class="ab-backdrop" onclick="window.dismissAlertBanner()"></div>' +
            '<div class="ab-card">' +
              '<div class="ab-timer" id="ab-timer" aria-live="polite">--:--</div>' +
              '<img src="namaskar.png" class="ab-namaskar" alt="" aria-hidden="true">' +
              '<p class="ab-message" id="ab-msg">' +
                '<span class="ab-assamese">প্ৰিয় দৰ্শক,&nbsp; অনুষ্ঠানসূচী অতি শীঘ্ৰেই আৰম্ভ হ\'ব। অনুগ্ৰহ কৰি আপোনালোকে আসন গ্ৰহণ কৰক।</span>' +
                '<span class="ab-english" id="ab-en"></span>' +
              '</p>' +
              '<button class="ab-dismiss" onclick="window.dismissAlertBanner()">Ok</button>' +
            '</div>';
          document.body.appendChild(el);
        }
        return el;
      }

      /** Update the timer pill every second — counts down or up depending on mode. */
      function _tickClock() {
        var timerEl = document.getElementById('ab-timer');
        if (!timerEl) return;
        if (_endTime !== null) {
          // Timed banner: count DOWN to end
          var remMs = Math.max(0, _endTime - Date.now());
          var totalSecs = Math.round(remMs / 1000);
          timerEl.textContent = Math.floor(totalSecs / 60) + ':' + _p2(totalSecs % 60);
          if (remMs <= 0) { window.dismissAlertBanner(); }
        } else if (_isManual && _manualStartTime !== null) {
          // Manual banner: count UP (elapsed time since shown)
          var elapsed = Math.floor((Date.now() - _manualStartTime) / 1000);
          timerEl.textContent = Math.floor(elapsed / 60) + ':' + _p2(elapsed % 60);
        }
      }

      function _stopClock() {
        if (_clockIv) { clearInterval(_clockIv); _clockIv = null; }
      }

      window.dismissAlertBanner = function () {
        _stopClock();
        _endTime = null;
        _manualStartTime = null;
        var el = document.getElementById('alert-banner');
        if (el) el.classList.remove('ab-visible', 'ab-manual');
        var timerEl = document.getElementById('ab-timer');
        if (timerEl) timerEl.textContent = '--:--';
        if (_isManual) {
          _isManual = false;
          try { localStorage.setItem(MANUAL_KEY, 'hidden'); } catch (e) {}
          // Notify via SSE (local dev) and Firebase (GitHub Pages / cross-device)
          try {
            fetch('/control', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ banner: 'hidden' }),
            }).catch(function () {});
          } catch (_) {}
          if (window.fbControlUpdate) window.fbControlUpdate({ banner: 'hidden' });
        }
      };

      /** Manually show the first banner (admin toggle) — no countdown, shows LIVE pill. */
      window.showManualBanner = function () {
        _isManual = true;
        _stopClock();
        _endTime = Date.now() + 5 * 60000; // 5-minute countdown
        _manualStartTime = null;
        var banner = _getBanner();
        var en = document.getElementById('ab-en');
        if (en) en.textContent = CONFIGS[0].message;
        var timerEl = document.getElementById('ab-timer');
        if (timerEl) timerEl.textContent = '5:00';
        banner.classList.add('ab-manual', 'ab-visible');
        _clockIv = setInterval(_tickClock, 1000);
      };

      /**
       * Polling fallback — called every second by updateAutoAdvStatus.
       * Ensures the banner appears even if the storage event was missed.
       */
      window.syncManualBanner = function () {
        try {
          var wanted = localStorage.getItem(MANUAL_KEY) === 'showing';
          if (wanted && !_isManual) {
            window.showManualBanner();
          } else if (!wanted && _isManual) {
            // Admin hid it — dismiss without writing to localStorage (already updated by admin)
            _stopClock();
            _endTime  = null;
            _isManual = false;
            var el = document.getElementById('alert-banner');
            if (el) el.classList.remove('ab-visible', 'ab-manual');
          }
        } catch (e) {}
      };

      // React to admin toggling the manual banner from admin.html (instant response)
      window.addEventListener('storage', function (ev) {
        if (ev.key !== MANUAL_KEY) return;
        if (ev.newValue === 'showing') {
          window.showManualBanner();
        } else if (_isManual) {
          window.dismissAlertBanner();
        }
      });

      // Restore manual banner state on page load (e.g. after refresh)
      try {
        if (localStorage.getItem(MANUAL_KEY) === 'showing') window.showManualBanner();
      } catch (e) {}

      /**
       * Called every second from updateAutoAdvStatus.
       * Shows the banner when remaining time for a configured item falls within its threshold.
       */
      window.checkAndShowAlert = function (data) {
        if (!data || !data.autoAdvanceStartedAt ||
            data.manualCurrentSequenceId == null ||
            data.manualCurrentSequenceId === '') return;

        var seqId = Number(data.manualCurrentSequenceId);
        var config = null;
        for (var ci = 0; ci < CONFIGS.length; ci++) {
          if (CONFIGS[ci].seqId === seqId) { config = CONFIGS[ci]; break; }
        }
        if (!config) return;

        var items = data.items || [];
        var currentItem = null;
        for (var ii = 0; ii < items.length; ii++) {
          if (Number(items[ii].sequenceId) === seqId) { currentItem = items[ii]; break; }
        }
        if (!currentItem) return;

        var durationMs = Math.max(0, Number(currentItem.durationMinutes) || 0) * 60000;
        var elapsed    = Date.now() - data.autoAdvanceStartedAt;
        var remaining  = durationMs - elapsed;
        var key        = seqId + '_' + data.autoAdvanceStartedAt;

        if (remaining > 0 && remaining <= config.alertBeforeMs && _shownKey !== key) {
          _shownKey = key;
          _stopClock();
          _endTime = Date.now() + remaining;
          var banner = _getBanner();
          var en = document.getElementById('ab-en');
          if (en) en.textContent = config.message;
          // Populate timer pill immediately so it is never blank when banner appears
          var timerInit = document.getElementById('ab-timer');
          if (timerInit) {
            var initSecs = Math.round(remaining / 1000);
            timerInit.textContent = Math.floor(initSecs / 60) + ':' + _p2(initSecs % 60);
          }
          banner.classList.add('ab-visible');
          _clockIv = setInterval(_tickClock, 1000);
        }
      };
    })();
    /* ─────────────────────────────────────────────────────────────────────── */

    function getData() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        return raw ? JSON.parse(raw) : null;
      } catch (e) {
        return null;
      }
    }

    function saveData(data) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      } catch (e) { /* ignore quota */ }
    }

    function isChaiBreakItem(item) {
      const parts = [item.description1, item.description2, item.description].filter(function (x) { return x != null && String(x).trim() !== ''; });
      const t = parts.join(' ').toUpperCase().replace(/\s+/g, ' ').trim();
      return t.includes('BREAK') && t.includes('WATER') && t.includes('TEA');
    }

    /** Two lines: description1, then description2; legacy `description` if needed. */
    function itemDescriptionHtml(item) {
      const d1 = item.description1 != null ? String(item.description1).trim() : '';
      const d2 = item.description2 != null ? String(item.description2).trim() : '';
      if (d1 || d2) {
        let out = '';
        if (d1) out += escapeHtml(d1);
        if (d1 && d2) out += '<br />';
        if (d2) out += escapeHtml(d2);
        return out;
      }
      const leg = item.description != null ? String(item.description).trim() : '';
      if (leg) return escapeHtml(leg);
      if (typeof item.durationMinutes === 'string') return escapeHtml(String(item.durationMinutes));
      return '';
    }

    function formatDuration(item) {
      const d = item.durationMinutes;
      if (d == null || d === '') return '—';
      if (typeof d === 'number') return `${d} min`;
      return escapeHtml(String(d));
    }

    function renderProgramme(data, scrollToManual) {
      if (!data) {
        applyEventTitles(null);
        contentEl.innerHTML = '<p class="error">No programme loaded. Run <code>npm start</code> and open this page over HTTP, or use <a href="admin.html">Admin</a> to load <strong>events.json</strong>.</p>';
        return;
      }
      applyEventTitles(data);
      const items = data.items || [];
      if (items.length === 0) {
        contentEl.innerHTML = '<p class="loading">No programme items. Load events.json from the <a href="admin.html">admin page</a>.</p>';
        return;
      }
      const view = getAgendaViewState(data);
      const ordered = view.ordered;
      const currentIndex = view.currentIndex;
      const agendaPinned = view.agendaPinned;
      const descClass = (style) => style === 'large' ? ' description-large' : style === 'largeBold' ? ' description-largeBold' : '';
      const presenterKey = 'Presenter(s)';
      contentEl.innerHTML = `
        <ul class="event-list">
          ${ordered.map((item, i) => {
            const gap = item.gapTime != null && item.gapTime !== '' ? `<div class="meta-line">Gap after: ${escapeHtml(String(item.gapTime))} min</div>` : '';
            const prep = item.prepTime != null && item.prepTime !== '' && Number(item.prepTime) !== 0
              ? `<div class="meta-line">Prep: ${escapeHtml(String(item.prepTime))} min</div>`
              : '';
            const art = item[presenterKey] && String(item[presenterKey]).trim() !== ''
              ? `<div class="meta-line meta-presenter"><span class="meta-label">Presenter(s):</span>${escapeHtml(String(item[presenterKey]).trim())}</div>`
              : '';
            const seqIdRaw = item.sequenceId != null && item.sequenceId !== '' ? String(item.sequenceId) : '';
            const seq = seqIdRaw || '—';
            const descInner = itemDescriptionHtml(item);
            const d2lower = item.description2 != null ? String(item.description2).trim().toLowerCase() : '';
            const isDinner = item.sequenceId === 39 || item.sequenceId === '39' || d2lower === 'dinner'
              || ((item.sequenceId === 38 || item.sequenceId === '38') && item.description2 == null && String(item.description || '').toUpperCase().includes('DINNER'));
            const isChaiBreak = !isDinner && isChaiBreakItem(item);
            const isSnacks = !isDinner && !isChaiBreak && (item.sequenceId === 0 || item.sequenceId === '0');
            const isHouse = !isDinner && (item.sequenceId === 41 || item.sequenceId === '41');
            const dinnerClass = isDinner ? ' dinner-showcase' : '';
            const chaiClass = isChaiBreak ? ' chai-break' : '';
            const snacksClass = isSnacks ? ' snacks-showcase' : '';
            const houseClass = isHouse ? ' house-showcase' : '';
            const dinnerLayers = isDinner
              ? `<div class="dinner-bg" aria-hidden="true"><div class="dinner-bg-col dinner-bg-left"></div><div class="dinner-bg-col dinner-bg-right"></div></div><div class="dinner-scrim" aria-hidden="true"></div>`
              : '';
            const houseLayers = isHouse
              ? '<div class="house-bg" aria-hidden="true"></div><div class="house-scrim" aria-hidden="true"></div>'
              : '';
            const sideThumb = isChaiBreak
              ? '<div class="item-side-thumb item-side-thumb-chai" aria-hidden="true"></div>'
              : isSnacks
                ? '<div class="item-side-thumb item-side-thumb-snacks" aria-hidden="true"></div>'
                : '';
            const pinClass = agendaPinned && i === currentIndex ? ' agenda-pinned' : '';
            return `
            <li class="event-item${dinnerClass}${chaiClass}${snacksClass}${houseClass}${i === currentIndex ? ' current' : ''}${pinClass}" data-index="${i}" data-sequence-id="${escapeHtml(seqIdRaw)}">
              ${dinnerLayers}${houseLayers}
              <span class="seq">${escapeHtml(seq)}</span>
              <div class="body">
                <p class="description${descClass(item.displayStyle)}">${descInner || '—'}</p>
                ${prep}
                ${gap}
                ${art}
                <div class="auto-adv-status" data-adv-id="${escapeHtml(seqIdRaw)}"></div>
              </div>
              ${sideThumb}
              <div class="time-block">
                <div class="start-time">${escapeHtml(formatTimeForDisplay(item.expectedStartTime))}</div>
                <div class="duration">${formatDuration(item)}</div>
              </div>
            </li>`;
          }).join('')}
        </ul>
      `;
      if (scrollToManual && hasManualAgendaHighlight(data)) {
        const k = String(data.manualCurrentSequenceId);
        const found = items.some(function (it) { return String(it.sequenceId) === k; });
        if (found) {
          requestAnimationFrame(function () {
            scrollProgrammeItemIntoView(k);
          });
        }
      }
    }

    function refresh() {
      const data = getData();
      if (!data || !data.items || data.items.length === 0) return;
      const view = getAgendaViewState(data);
      const list = contentEl.querySelector('.event-list');
      if (!list) return;
      const els = list.querySelectorAll('.event-item');
      if (els.length !== view.ordered.length) {
        renderProgramme(data, false);
        return;
      }
      for (let i = 0; i < view.ordered.length; i++) {
        const el = els[i];
        const item = view.ordered[i];
        const sid = item.sequenceId != null && item.sequenceId !== '' ? String(item.sequenceId) : '';
        if (!el || el.getAttribute('data-sequence-id') !== sid) {
          renderProgramme(data, false);
          return;
        }
      }
      const ci = view.currentIndex;
      const pinned = view.agendaPinned;
      els.forEach((el, i) => {
        el.classList.toggle('current', i === ci);
        el.classList.toggle('agenda-pinned', pinned && i === ci);
      });
    }

    async function init() {
      let data = null;
      try {
        const res = await fetch('events.json', { cache: 'no-store' });
        if (res.ok) {
          const text = await res.text();
          const parsed = JSON.parse(text);
          if (parsed && parsed.items && parsed.items.length) {
            const prior = getData();
            if (prior && hasManualAgendaHighlight(prior)) {
              const k = String(prior.manualCurrentSequenceId);
              if (parsed.items.some(function (it) { return String(it.sequenceId) === k; })) {
                parsed.manualCurrentSequenceId = prior.manualCurrentSequenceId;
                // Preserve timer start so auto-advance continues across page reloads
                if (prior.autoAdvanceStartedAt) parsed.autoAdvanceStartedAt = prior.autoAdvanceStartedAt;
              }
            }
            saveData(parsed);
            data = parsed;
          }
        }
      } catch (e) { /* file://, offline, or bad JSON */ }
      if (!data || !data.items || data.items.length === 0) {
        data = getData();
      }
      renderProgramme(data, true);
      scheduleAutoAdvance(data);
      setInterval(refresh, 15000);
      setInterval(updateAutoAdvStatus, 1000);
      // Start ambient animation after the initial burst fades (~16 s), then keep in sync
      setTimeout(function () {
        if (window.updateAmbientAnimation) {
          window.updateAmbientAnimation(getData());
          setInterval(function () {
            if (window.updateAmbientAnimation) window.updateAmbientAnimation(getData());
          }, 3000);
        }
      }, 16000);
      window.addEventListener('storage', function () {
        const newData = getData();
        renderProgramme(newData, true);
        scheduleAutoAdvance(newData);
        if (window.updateAmbientAnimation) window.updateAmbientAnimation(newData);
      });
    }

    init();
  </script>

  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
  <script src="firebase-config.js"></script>
  <script>
  (function initFirebaseDisplay() {
    if (typeof FIREBASE_CONFIG === 'undefined' || !FIREBASE_CONFIG ||
        !FIREBASE_CONFIG.databaseURL || FIREBASE_CONFIG.apiKey === 'YOUR_API_KEY') return;
    try {
      firebase.initializeApp(FIREBASE_CONFIG);
      var db = firebase.database();

      // Expose so dismissAlertBanner and other code can write back to Firebase
      window.fbControlUpdate = function (obj) {
        try { db.ref('control').update(obj); } catch (_) {}
      };

      // Track last-seen focus to avoid re-applying identical state
      var _lastFocusKey = '';

      // Listen for all control state changes from any device
      db.ref('control').on('value', function (snap) {
        var state = snap.val();
        if (!state) return;

        // ── Focus override (admin set a different "In Progress" item) ──────
        if ('focus' in state) {
          if (state.focus !== null && state.focus !== undefined) {
            var key = state.focus.seqId + '_' + state.focus.startedAt;
            if (key !== _lastFocusKey) {
              _lastFocusKey = key;
              if (window.applyFocusOverride) {
                window.applyFocusOverride(state.focus.seqId, state.focus.startedAt);
              }
            }
          } else {
            if (_lastFocusKey !== 'cleared') {
              _lastFocusKey = 'cleared';
              if (window.clearFocusOverride) window.clearFocusOverride();
            }
          }
        }

        // ── Music ──────────────────────────────────────────────────────────
        if (state.music !== undefined) {
          try { localStorage.setItem('dholMusicState', state.music); } catch (_) {}
          if (window.syncDholAudio) window.syncDholAudio();
        }

        // ── Banner ─────────────────────────────────────────────────────────
        if (state.banner !== undefined) {
          try { localStorage.setItem('manualBannerState', state.banner); } catch (_) {}
          if (window.syncManualBanner) window.syncManualBanner();
        }
      });
    } catch (e) {
      // Firebase unavailable — SSE + localStorage handle it
    }
  })();
  </script>
</body>
</html>
